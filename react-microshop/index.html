<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>REACT — MicroShop</title>
    <meta name="description" content="React microsite: catalog filters, cart drawer, and persisted cart." />
    <script id="vwo-config" type="application/json">
      {"accountId": 3001101, "useEdge": false}
    </script>
    <script src="/vwo/vwo-smartcode.js"></script>
    <style>
      :root{
        --bg:#090b10; --panel:rgba(255,255,255,.06); --panel2:rgba(255,255,255,.09);
        --line:rgba(255,255,255,.14); --text:rgba(255,255,255,.92); --muted:rgba(255,255,255,.66);
        --a:#60a5fa; --b:#a78bfa; --ok:#34d399; --bad:#fb7185;
        --shadow:0 18px 60px rgba(0,0,0,.45);
      }
      *{box-sizing:border-box}
      html,body{height:100%}
      body{
        margin:0; color:var(--text);
        font:500 14px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background:
          radial-gradient(950px 560px at 15% 0%, rgba(96,165,250,.18), transparent 60%),
          radial-gradient(900px 560px at 80% 10%, rgba(167,139,250,.16), transparent 55%),
          radial-gradient(900px 680px at 60% 92%, rgba(52,211,153,.12), transparent 55%),
          var(--bg);
      }
      a{color:inherit}
      .wrap{max-width:1160px;margin:0 auto;padding:18px 14px 44px}
      header{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:14px}
      h1{margin:0;font-size:18px;letter-spacing:-.01em}
      .sub{margin:4px 0 0;color:var(--muted);max-width:75ch}
      .pill{border:1px solid var(--line); border-radius:999px; padding:6px 10px; color:var(--muted); font-size:12px; background:rgba(255,255,255,.03)}
      #root{border:1px solid var(--line); border-radius:14px; overflow:hidden; background:linear-gradient(180deg, var(--panel), rgba(255,255,255,.03)); box-shadow:var(--shadow)}
      .btn{border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--text); padding:9px 10px; border-radius:10px; cursor:pointer;}
      .btn:hover{border-color:rgba(255,255,255,.26)}
      .btn.primary{background:linear-gradient(135deg, rgba(96,165,250,.22), rgba(167,139,250,.14));}
      input,select{background:rgba(11,16,32,.85); border:1px solid var(--line); color:var(--text); padding:10px 10px; border-radius:10px; outline:none;}
      input:focus,select:focus{border-color:rgba(96,165,250,.6); box-shadow:0 0 0 3px rgba(96,165,250,.12)}
      .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
      .topbar{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;padding:12px;border-bottom:1px solid var(--line);background:rgba(0,0,0,.22)}
      .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px;padding:12px}
      .card{grid-column:span 4;border:1px solid rgba(255,255,255,.10);border-radius:12px;background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));overflow:hidden;display:flex;flex-direction:column}
      .card .hd{padding:10px;display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
      .card h2{margin:0;font-size:14px;letter-spacing:-.01em}
      .meta{color:var(--muted);font-size:12px;margin-top:4px}
      .tags{display:flex;gap:6px;flex-wrap:wrap;padding:0 10px 10px}
      .tag{font-size:12px;color:var(--muted);border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);padding:4px 8px;border-radius:999px}
      .card .ft{margin-top:auto;padding:10px;border-top:1px solid rgba(255,255,255,.09);display:flex;gap:8px;flex-wrap:wrap}
      .price{font-weight:800}
      .drawer{position:fixed; inset:0; display:grid; grid-template-columns:1fr min(420px, 92vw); background:rgba(0,0,0,.55); backdrop-filter: blur(6px);}
      .drawerPanel{grid-column:2; height:100%; background:rgba(10,12,18,.92); border-left:1px solid rgba(255,255,255,.12); display:flex; flex-direction:column;}
      .drawerHd{padding:12px;border-bottom:1px solid rgba(255,255,255,.12);display:flex;justify-content:space-between;align-items:center}
      .drawerBd{padding:12px;display:grid;gap:10px;overflow:auto}
      .line{display:flex;justify-content:space-between;gap:10px;align-items:center;border:1px solid rgba(255,255,255,.10);border-radius:12px;padding:10px;background:rgba(255,255,255,.04)}
      .qty{display:flex;gap:6px;align-items:center}
      .muted{color:var(--muted)}
      @media (max-width: 980px){ .card{grid-column:span 6} }
      @media (max-width: 620px){ .card{grid-column:span 12} }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <h1>REACT — MicroShop</h1>
          <p class="sub">Filter the catalog, add items to cart, and refresh — your cart persists via <code>localStorage</code>.</p>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <a class="pill" href="/">← Showcase</a>
          <span class="pill">React ESM (no build)</span>
        </div>
      </header>
      <div id="root"></div>
    </div>

    <script type="module">
      import React, { useEffect, useMemo, useState } from "https://esm.sh/react@19.2.3";
      import { createRoot } from "https://esm.sh/react-dom@19.2.3/client";

      const CART_KEY = "react-microshop:cart:v1";
      const PRODUCTS = [
        { id:"p1", name:"Cloud Keyboard", price:129, tags:["desk","mechanical","quiet"], rating:4.7 },
        { id:"p2", name:"Studio Headphones", price:199, tags:["audio","wireless","anc"], rating:4.9 },
        { id:"p3", name:"Pocket Charger", price:39, tags:["travel","usb-c","fast"], rating:4.5 },
        { id:"p4", name:"Minimal Backpack", price:89, tags:["travel","waterproof","15in"], rating:4.6 },
        { id:"p5", name:"Desk Lamp Pro", price:59, tags:["desk","warm","dimmable"], rating:4.4 },
        { id:"p6", name:"Smart Bottle", price:49, tags:["health","tracker","app"], rating:4.2 },
      ];

      const money = (n) => new Intl.NumberFormat(undefined, { style:"currency", currency:"USD" }).format(n);
      const loadCart = () => { try { return JSON.parse(localStorage.getItem(CART_KEY)) || {}; } catch { return {}; } };
      const saveCart = (c) => localStorage.setItem(CART_KEY, JSON.stringify(c));

      function Drawer({ open, onClose, cart, setCart }){
        const lines = Object.entries(cart)
          .map(([id, qty]) => ({ product: PRODUCTS.find(p => p.id === id), qty }))
          .filter(x => x.product && x.qty > 0);
        const total = lines.reduce((s, l) => s + l.product.price * l.qty, 0);
        if (!open) return null;
        return (
          <div className="drawer" role="dialog" aria-modal="true">
            <div onClick={onClose} aria-label="Close cart overlay" />
            <div className="drawerPanel">
              <div className="drawerHd">
                <div style={{display:"grid", gap:2}}>
                  <strong>Cart</strong>
                  <span className="muted" style={{fontSize:12}}>{lines.length} item type(s)</span>
                </div>
                <button className="btn" onClick={onClose}>Close</button>
              </div>
              <div className="drawerBd">
                {lines.length === 0 ? (
                  <div className="muted">Your cart is empty. Add something from the catalog.</div>
                ) : (
                  <>
                    {lines.map(({ product, qty }) => (
                      <div className="line" key={product.id}>
                        <div>
                          <div style={{fontWeight:750}}>{product.name}</div>
                          <div className="muted" style={{fontSize:12}}>{money(product.price)} • {product.rating}★</div>
                        </div>
                        <div className="qty">
                          <button className="btn" onClick={() => setCart(c => ({ ...c, [product.id]: Math.max(0, (c[product.id]||0) - 1) }))}>-</button>
                          <span style={{minWidth:20, textAlign:"center"}}>{qty}</span>
                          <button className="btn" onClick={() => setCart(c => ({ ...c, [product.id]: (c[product.id]||0) + 1 }))}>+</button>
                        </div>
                      </div>
                    ))}
                    <div className="line" style={{justifyContent:"space-between"}}>
                      <strong>Total</strong>
                      <strong>{money(total)}</strong>
                    </div>
                    <button className="btn primary" onClick={() => alert("Checkout simulated (static site).")}>Checkout</button>
                    <button className="btn" onClick={() => { if (confirm("Clear cart?")) setCart({}); }}>Clear cart</button>
                  </>
                )}
              </div>
            </div>
          </div>
        );
      }

      function App(){
        const [q, setQ] = useState("");
        const [tag, setTag] = useState("any");
        const [sort, setSort] = useState("featured");
        const [drawer, setDrawer] = useState(false);
        const [cart, setCart] = useState(() => loadCart());

        useEffect(() => saveCart(cart), [cart]);
        useEffect(() => {
          const onKey = (e) => { if (e.key === "Escape") setDrawer(false); };
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, []);

        const tags = useMemo(() => ["any", ...Array.from(new Set(PRODUCTS.flatMap(p => p.tags)))], []);
        const count = useMemo(() => Object.values(cart).reduce((s, n) => s + (n||0), 0), [cart]);

        const filtered = useMemo(() => {
          const n = q.trim().toLowerCase();
          let rows = PRODUCTS.filter(p => {
            if (tag !== "any" && !p.tags.includes(tag)) return false;
            if (!n) return true;
            const hay = (p.name + " " + p.tags.join(" ")).toLowerCase();
            return hay.includes(n);
          });
          if (sort === "price-asc") rows = [...rows].sort((a,b) => a.price - b.price);
          if (sort === "price-desc") rows = [...rows].sort((a,b) => b.price - a.price);
          if (sort === "rating") rows = [...rows].sort((a,b) => b.rating - a.rating);
          return rows;
        }, [q, tag, sort]);

        return (
          <>
            <div className="topbar">
              <div className="row">
                <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search (e.g. travel, desk, audio)..." style={{minWidth:260}} />
                <select value={tag} onChange={(e) => setTag(e.target.value)} aria-label="Tag">
                  {tags.map(t => <option key={t} value={t}>{t === "any" ? "All tags" : t}</option>)}
                </select>
                <select value={sort} onChange={(e) => setSort(e.target.value)} aria-label="Sort">
                  <option value="featured">Featured</option>
                  <option value="rating">Sort: rating</option>
                  <option value="price-asc">Sort: price ↑</option>
                  <option value="price-desc">Sort: price ↓</option>
                </select>
                <button className="btn" onClick={() => { setQ(""); setTag("any"); setSort("featured"); }}>Reset</button>
              </div>
              <div className="row">
                <span className="pill">{filtered.length} product(s)</span>
                <button className="btn primary" onClick={() => setDrawer(true)} aria-label="Open cart">
                  Cart ({count})
                </button>
              </div>
            </div>

            <div className="grid">
              {filtered.map(p => (
                <article className="card" key={p.id}>
                  <div className="hd">
                    <div>
                      <h2>{p.name}</h2>
                      <div className="meta">{p.rating}★ • <span className="price">{money(p.price)}</span></div>
                    </div>
                    <span className="tag">{p.tags[0]}</span>
                  </div>
                  <div className="tags">
                    {p.tags.map(t => <span key={t} className="tag">{t}</span>)}
                  </div>
                  <div className="ft">
                    <button className="btn primary" onClick={() => setCart(c => ({ ...c, [p.id]: (c[p.id]||0) + 1 }))}>Add to cart</button>
                    <button className="btn" onClick={() => alert(`This is a static demo.\n\n${p.name}\nTags: ${p.tags.join(", ")}\nRating: ${p.rating}`)}>Details</button>
                  </div>
                </article>
              ))}
            </div>

            <Drawer open={drawer} onClose={() => setDrawer(false)} cart={cart} setCart={setCart} />
          </>
        );
      }

      createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
