<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SPA — Recipe Radar</title>
    <meta name="description" content="Vanilla SPA: filter recipes by ingredients, save favorites, generate shopping list." />
   <!-- Start VWO SmartCode --> 
<script referrerpolicy="no-referrer-when-downgrade" src="https://dev.visualwebsiteoptimizer.com/tag/1209672.js" id="vwoCode"></script>

    <style>
      :root{
        --bg:#070a0f; --panel:#0b1220; --line:rgba(255,255,255,.12);
        --text:rgba(255,255,255,.92); --muted:rgba(255,255,255,.65);
        --a:#f97316; --b:#22c55e; --c:#60a5fa;
        --shadow:0 18px 55px rgba(0,0,0,.48);
      }
      *{box-sizing:border-box}
      html,body{height:100%}
      body{
        margin:0; color:var(--text);
        font:500 14px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background:
          radial-gradient(900px 520px at 15% 10%, rgba(249,115,22,.16), transparent 60%),
          radial-gradient(850px 520px at 65% 20%, rgba(34,197,94,.12), transparent 55%),
          radial-gradient(900px 620px at 60% 95%, rgba(96,165,250,.12), transparent 55%),
          var(--bg);
      }
      a{color:inherit}
      .wrap{max-width:1100px;margin:0 auto;padding:18px 14px 46px}
      header{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:14px}
      h1{margin:0;font-size:18px;letter-spacing:-.01em}
      .sub{margin:4px 0 0;color:var(--muted);max-width:70ch}
      .pill{border:1px solid var(--line); border-radius:999px; padding:6px 10px; color:var(--muted); font-size:12px; background:rgba(255,255,255,.03)}
      .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}
      .panel{
        grid-column:span 12; border:1px solid var(--line); border-radius:14px;
        background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
        box-shadow:var(--shadow); overflow:hidden;
      }
      .topbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;padding:12px;background:rgba(0,0,0,.22);border-bottom:1px solid var(--line)}
      .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
      input,select,button,textarea{
        background:rgba(11,18,32,.85); border:1px solid var(--line); color:var(--text);
        padding:10px 10px; border-radius:10px; outline:none;
      }
      input:focus,select:focus,textarea:focus{border-color:rgba(249,115,22,.55); box-shadow:0 0 0 3px rgba(249,115,22,.12)}
      button{cursor:pointer}
      button:hover{border-color:rgba(255,255,255,.25)}
      .btnA{background:linear-gradient(135deg, rgba(249,115,22,.18), rgba(34,197,94,.10))}
      .content{display:grid;grid-template-columns:2fr 1fr;gap:12px;padding:12px}
      .list{display:grid;grid-template-columns:repeat(2, minmax(0,1fr));gap:12px}
      .card{
        border:1px solid rgba(255,255,255,.10); border-radius:12px; overflow:hidden;
        background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
        display:flex; flex-direction:column;
      }
      .card .hd{padding:10px;display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
      .card h2{margin:0;font-size:14px;letter-spacing:-.01em}
      .meta{color:var(--muted);font-size:12px;margin-top:4px}
      .tags{display:flex;gap:6px;flex-wrap:wrap;padding:0 10px 10px}
      .tag{font-size:12px;color:var(--muted);border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);padding:4px 8px;border-radius:999px}
      .card .ft{margin-top:auto;display:flex;gap:8px;flex-wrap:wrap; padding:10px;border-top:1px solid rgba(255,255,255,.09)}
      .side{
        border:1px solid rgba(255,255,255,.10); border-radius:12px; overflow:hidden;
        background:rgba(11,18,32,.55);
      }
      .side h3{margin:0;padding:10px;border-bottom:1px solid rgba(255,255,255,.09);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
      .side .box{padding:10px;display:grid;gap:10px}
      ul{margin:0;padding-left:18px;color:var(--muted)}
      .empty{color:var(--muted);font-size:13px}
      .small{font-size:12px;color:var(--muted)}
      @media (max-width: 940px){
        .content{grid-template-columns:1fr}
        .list{grid-template-columns:1fr}
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <h1>SPA — Recipe Radar</h1>
          <p class="sub">Try typing ingredients like <code>chicken</code>, <code>rice</code>, <code>tomato</code>. Save favorites and generate a shopping list.</p>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <a class="pill" href="/">← Showcase</a>
          <button id="reset" class="pill" type="button">Reset</button>
        </div>
      </header>

      <div class="panel">
        <div class="topbar">
          <div class="filters">
            <input id="q" placeholder="Search recipes…" />
            <input id="ing" placeholder="Ingredients (comma-separated)" />
            <select id="diet" aria-label="Diet">
              <option value="any">Any diet</option>
              <option value="veg">Vegetarian</option>
              <option value="gf">Gluten-free</option>
              <option value="hi-protein">High protein</option>
            </select>
            <select id="time" aria-label="Time">
              <option value="any">Any time</option>
              <option value="15">≤ 15 min</option>
              <option value="30">≤ 30 min</option>
              <option value="45">≤ 45 min</option>
            </select>
            <label class="small" style="display:flex;gap:8px;align-items:center">
              <input id="favOnly" type="checkbox" style="width:auto" />
              Favorites only
            </label>
          </div>
          <button class="btnA" id="addToList" type="button">Add selected to shopping list</button>
        </div>

        <div class="content">
          <div>
            <div class="small" id="count" style="margin:0 0 10px 2px"></div>
            <div class="list" id="list"></div>
          </div>

          <aside class="side">
            <h3>Shopping list</h3>
            <div class="box">
              <div class="small">Click an item to toggle “bought”.</div>
              <div id="shopEmpty" class="empty">No items yet.</div>
              <ul id="shop"></ul>
              <div style="display:flex;gap:8px;flex-wrap:wrap">
                <button id="copy" type="button">Copy</button>
                <button id="clearShop" type="button">Clear list</button>
              </div>
              <div class="small" id="status"></div>
            </div>
          </aside>
        </div>
      </div>
    </div>

    <script>
      const KEY_FAV = "spa-recipe-radar:favs:v1";
      const KEY_SHOP = "spa-recipe-radar:shop:v1";
      const $ = (id) => document.getElementById(id);

      const RECIPES = [
        { id:"r1", name:"Spicy Tomato Chickpea Stew", time:35, diet:["veg","gf"], tags:["tomato","chickpeas","spinach","garlic"], ingredients:["canned chickpeas","tomatoes","spinach","onion","garlic","paprika"] },
        { id:"r2", name:"Lemon Chicken Rice Bowl", time:30, diet:["hi-protein","gf"], tags:["chicken","rice","lemon","cucumber"], ingredients:["chicken","rice","lemon","cucumber","yogurt","olive oil"] },
        { id:"r3", name:"Miso Salmon with Greens", time:20, diet:["hi-protein","gf"], tags:["salmon","miso","ginger"], ingredients:["salmon","miso paste","ginger","soy sauce (gf)","greens"] },
        { id:"r4", name:"Pesto Pasta + Roasted Veg", time:40, diet:["veg"], tags:["pasta","pesto","zucchini"], ingredients:["pasta","pesto","zucchini","bell pepper","parmesan"] },
        { id:"r5", name:"15-min Egg Fried Rice", time:15, diet:["hi-protein"], tags:["egg","rice","scallion"], ingredients:["rice","eggs","scallions","soy sauce","peas"] },
        { id:"r6", name:"Taco Salad Crunch Bowl", time:25, diet:["gf"], tags:["beans","corn","avocado"], ingredients:["black beans","corn","avocado","lime","lettuce","tomato"] },
      ];

      function loadFavs(){ try { return new Set(JSON.parse(localStorage.getItem(KEY_FAV)) || []); } catch { return new Set(); } }
      function saveFavs(set){ localStorage.setItem(KEY_FAV, JSON.stringify([...set])); }

      function loadShop(){ try { return JSON.parse(localStorage.getItem(KEY_SHOP)) || []; } catch { return []; } }
      function saveShop(items){ localStorage.setItem(KEY_SHOP, JSON.stringify(items)); renderShop(); }

      function norm(s){ return String(s||"").toLowerCase().trim(); }
      function splitIngs(s){
        return norm(s).split(",").map(x => x.trim()).filter(Boolean);
      }

      function matches(r, f, favs){
        if (f.favOnly && !favs.has(r.id)) return false;
        if (f.q && !norm(r.name).includes(f.q)) return false;
        if (f.diet !== "any" && !r.diet.includes(f.diet)) return false;
        if (f.time !== "any" && r.time > Number(f.time)) return false;
        const req = splitIngs(f.ing);
        if (req.length) {
          const hay = [...r.tags, ...r.ingredients].map(norm);
          for (const x of req) {
            const ok = hay.some(h => h.includes(x));
            if (!ok) return false;
          }
        }
        return true;
      }

      function render(){
        const favs = loadFavs();
        const f = {
          q: norm($("q").value),
          ing: $("ing").value,
          diet: $("diet").value,
          time: $("time").value,
          favOnly: $("favOnly").checked,
        };
        const rows = RECIPES.filter(r => matches(r, f, favs));
        $("count").textContent = `${rows.length} recipe(s) shown`;
        const root = $("list");
        root.innerHTML = "";
        for (const r of rows) root.appendChild(card(r, favs));
        if (!rows.length) {
          const d = document.createElement("div");
          d.className = "empty";
          d.textContent = "No matches. Try removing filters.";
          root.appendChild(d);
        }
      }

      function card(r, favs){
        const el = document.createElement("article");
        el.className = "card";
        el.dataset.id = r.id;
        el.innerHTML = `
          <div class="hd">
            <div>
              <h2>${escapeHtml(r.name)}</h2>
              <div class="meta">${r.time} min • ${r.diet.join(", ")}</div>
            </div>
            <label class="tag" style="cursor:pointer; user-select:none">
              <input type="checkbox" class="pick" style="width:auto; vertical-align:middle; margin-right:6px" />
              Select
            </label>
          </div>
          <div class="tags">${r.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("")}</div>
          <div class="ft">
            <button type="button" class="fav">${favs.has(r.id) ? "★ Favorited" : "☆ Favorite"}</button>
            <button type="button" class="ings">View ingredients</button>
          </div>
        `;

        el.querySelector(".fav").addEventListener("click", () => {
          const next = loadFavs();
          if (next.has(r.id)) next.delete(r.id); else next.add(r.id);
          saveFavs(next);
          render();
        });

        el.querySelector(".ings").addEventListener("click", () => {
          alert(`${r.name}\n\nIngredients:\n- ${r.ingredients.join("\n- ")}`);
        });

        return el;
      }

      function renderShop(){
        const items = loadShop();
        const ul = $("shop");
        ul.innerHTML = "";
        $("shopEmpty").style.display = items.length ? "none" : "block";
        for (const it of items) {
          const li = document.createElement("li");
          li.textContent = it.name + (it.bought ? " (bought)" : "");
          li.style.cursor = "pointer";
          li.style.textDecoration = it.bought ? "line-through" : "none";
          li.addEventListener("click", () => {
            const next = loadShop().map(x => x.name === it.name ? ({ ...x, bought: !x.bought }) : x);
            saveShop(next);
          });
          ul.appendChild(li);
        }
      }

      function addSelected(){
        const picks = Array.from(document.querySelectorAll(".pick")).map((c) => ({ checked: c.checked, id: c.closest(".card")?.dataset.id })).filter(x => x.checked && x.id);
        const chosen = picks.map(x => RECIPES.find(r => r.id === x.id)).filter(Boolean);
        const add = new Set(chosen.flatMap(r => r.ingredients).map(s => s.trim()).filter(Boolean));
        const cur = loadShop();
        const curNames = new Set(cur.map(x => x.name));
        const next = [...cur];
        for (const name of add) if (!curNames.has(name)) next.push({ name, bought: false });
        saveShop(next);
        status(`Added ${add.size} ingredient(s).`);
      }

      function status(msg){ $("status").textContent = msg; setTimeout(() => ($("status").textContent = ""), 2200); }
      function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[m])); }

      for (const id of ["q","ing","diet","time","favOnly"]) $(id).addEventListener("input", render);
      $("addToList").addEventListener("click", addSelected);
      $("clearShop").addEventListener("click", () => { if (confirm("Clear shopping list?")) saveShop([]); });
      $("copy").addEventListener("click", async () => {
        const items = loadShop();
        const text = items.map(x => `- ${x.name}${x.bought ? " (bought)" : ""}`).join("\n") || "No items.";
        try { await navigator.clipboard.writeText(text); status("Copied!"); }
        catch { status("Copy failed."); }
      });
      $("reset").addEventListener("click", () => {
        $("q").value = ""; $("ing").value = ""; $("diet").value = "any"; $("time").value = "any"; $("favOnly").checked = false;
        render();
        status("Filters reset.");
      });

      render();
      renderShop();
    </script>
  </body>
</html>
