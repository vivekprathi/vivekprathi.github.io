name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: next-pages/package-lock.json

      - name: Install Next.js deps
        working-directory: next-pages
        run: npm ci

      - name: Build Next.js static export
        working-directory: next-pages
        run: npm run build

      - name: Assemble site output
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "next-pages" \
            --exclude "react-pages" \
            ./ _site/
          rm -rf _site/next-showcase
          mkdir -p _site/next-showcase
          rsync -a next-pages/out/ _site/next-showcase/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

